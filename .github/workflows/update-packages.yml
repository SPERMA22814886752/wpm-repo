name: Update Packages

on:
  push:
    paths:
      - 'pool/**'
      - 'lib/**'
      - 'include/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Packages file
        run: |
          # Очищаем Packages файл
          > Packages
          
          echo "# WPM Packages" >> Packages
          echo "# Auto-generated by GitHub Actions" >> Packages
          echo "# Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> Packages
          echo "" >> Packages

          # Временный файл для правильной сборки
          temp_file=$(mktemp)
          
          # Находим все файлы
          find pool/main -type f ! -name "*.download" ! -name "*.tmp" | sort | while read file; do
            # Пропускаем пустые файлы
            [ ! -s "$file" ] && continue
            
            # Получаем расширение и имя
            filename=$(basename "$file")
            extension="${filename##*.}"
            
            # Определяем тип пакета
            type=""
            destdir=""
            pkgname=""
            libc="no"
            strip_components=0
            
            # Проверяем путь к библиотекам
            if echo "$file" | grep -q '/lib/so/'; then
              # Shared library package
              if echo "$file" | grep -q '/libc.tar.xz$'; then
                # Это архив с библиотекой
                pkgname=$(echo "$file" | sed 's|.*/lib/so/||' | sed 's|/libc\.tar\.xz$||')
                type="dir"
                destdir="lib"
                libc="so"
                strip_components=1
              else
                # Отдельный .so файл
                pkgname="$filename"
                type="so"
                destdir="lib"
                libc="so"
              fi
              
            elif echo "$file" | grep -q '/lib/a/'; then
              # Static library package
              if echo "$file" | grep -q '/libc.tar.xz$'; then
                pkgname=$(echo "$file" | sed 's|.*/lib/a/||' | sed 's|/libc\.tar\.xz$||')
                type="dir"
                destdir="lib"
                libc="a"
                strip_components=1
              else
                pkgname="$filename"
                type="a"
                destdir="lib"
                libc="a"
              fi
              
            else
              # Обычные пакеты
              case "$extension" in
                gz)
                  # .tar.gz архив
                  if echo "$filename" | grep -q '\.tar\.gz$'; then
                    pkgname="${filename%.tar.gz}"
                    type="dir"
                    destdir="bin"
                    
                    # Специальные пакеты
                    case "$pkgname" in
                      gcc|musl|linux-kernel)
                        destdir="/"
                        ;;
                    esac
                    
                    # Проверяем структуру архива для strip
                    first_file=$(tar -tzf "$file" 2>/dev/null | head -1)
                    if echo "$first_file" | grep -q '^[^/]*/usr/'; then
                      strip_components=1
                    fi
                  fi
                  ;;
                a)
                  # Static library
                  pkgname="$filename"
                  type="a"
                  destdir="lib"
                  ;;
                so|so.*)
                  # Shared library
                  pkgname="$filename"
                  type="so"
                  destdir="lib"
                  # Определяем libc
                  if echo "$pkgname" | grep -qE '^libc\.so|^ld-musl'; then
                    libc="so"
                  fi
                  ;;
                la)
                  # Libtool archive
                  pkgname="$filename"
                  type="la"
                  destdir="lib"
                  ;;
                h|hpp)
                  # Header file
                  pkgname="$filename"
                  type="dev"
                  destdir="include"
                  ;;
                *)
                  # Binary
                  pkgname="$filename"
                  type="bin"
                  destdir="bin"
                  ;;
              esac
            fi
            
            # Пропускаем если не определили
            [ -z "$pkgname" ] && continue
            [ -z "$type" ] && continue
            
            # Получаем метаданные
            size=$(stat -c%s "$file")
            md5=$(md5sum "$file" | cut -d' ' -f1)
            
            # Записываем во временный файл
            {
              echo "Package: $pkgname"
              echo "Version: 1.0"
              echo "Type: $type"
              echo "Filename: $file"
              echo "Size: $size"
              echo "MD5sum: $md5"
              echo "DestDir: $destdir"
              echo "libc: $libc"
              [ $strip_components -gt 0 ] && echo "StripComponents: $strip_components"
              echo ""
            } >> "$temp_file"
          done
          
          # Сортируем по имени пакета и добавляем в Packages
          sort -t: -k2,2 "$temp_file" | while IFS= read -r line; do
            # Восстанавливаем пустые строки между пакетами
            if [ -z "$line" ]; then
              echo "" >> Packages
            else
              echo "$line" >> Packages
            fi
          done
          
          rm -f "$temp_file"
          
          # Подсчитываем пакеты
          count=$(grep -c "^Package:" Packages)
          echo "" >> Packages
          echo "# Total packages: $count" >> Packages
          
          echo "✅ Generated $count packages"
          echo ""
          echo "📦 First 5 packages:"
          grep -A5 "^Package:" Packages | head -30

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Packages
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Packages (fixed generation)"
            git push
          fi
