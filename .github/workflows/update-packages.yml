name: Update Packages

on:
  push:
    paths:
      - 'pool/main/**'
      - 'pool/main/lib/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Packages file
        run: |
          echo "# WPM Packages" > Packages
          echo "# Auto-generated by GitHub Actions" >> Packages
          echo "" >> Packages
          
          # Функция для определения типа файла
          detect_type() {
              case "$1" in
                  *.a)   echo "lib" ;;
                  *.so)  echo "so" ;;
                  *.so.*) echo "so" ;;
                  *.h)   echo "dev" ;;
                  *.hpp) echo "dev" ;;
                  *.pc)  echo "dev" ;;
                  *.tar.gz) echo "dev" ;;
                  *)     echo "bin" ;;
              esac
          }
          
          # Функция для определения DestDir
          detect_destdir() {
              case "$1" in
                  *.a)   echo "lib" ;;
                  *.so)  echo "lib" ;;
                  *.so.*) echo "lib" ;;
                  *.h)   echo "include" ;;
                  *.hpp) echo "include" ;;
                  *.pc)  echo "lib/pkgconfig" ;;
                  *.tar.gz) echo "include" ;;
                  *)     echo "bin" ;;
              esac
          }
          
          # Обработка бинарников и библиотек в pool/main/
          for f in pool/main/*; do
            if [ -f "$f" ]; then
              name=$(basename "$f")
              size=$(stat -c%s "$f")
              md5=$(md5sum "$f" | cut -d' ' -f1)
              type=$(detect_type "$name")
              destdir=$(detect_destdir "$name")
              
              echo "Package: $name" >> Packages
              echo "Version: 1.0" >> Packages
              echo "Type: $type" >> Packages
              echo "Filename: $f" >> Packages
              echo "Size: $size" >> Packages
              echo "MD5sum: $md5" >> Packages
              echo "DestDir: $destdir" >> Packages
              
              # Добавляем симлинки для .so библиотек
              if [ "$type" = "so" ]; then
                  base=$(echo "$name" | sed 's/\.so.*//')
                  echo "Symlinks: ${base}.so" >> Packages
              fi
              
              echo "" >> Packages
            fi
          done
          
          # Обработка библиотек в lib/ (статические библиотеки)
          if [ -d "lib" ]; then
            for f in lib/*.a; do
              if [ -f "$f" ]; then
                name=$(basename "$f")
                size=$(stat -c%s "$f")
                md5=$(md5sum "$f" | cut -d' ' -f1)
                
                echo "Package: ${name%.a}" >> Packages
                echo "Version: 1.0" >> Packages
                echo "Type: lib" >> Packages
                echo "Filename: $f" >> Packages
                echo "Size: $size" >> Packages
                echo "MD5sum: $md5" >> Packages
                echo "DestDir: lib" >> Packages
                echo "" >> Packages
              fi
            done
          fi
          
          # Обработка заголовочных файлов в include/
          if [ -d "include" ]; then
            find include -name "*.h" -o -name "*.hpp" | while read -r f; do
              if [ -f "$f" ]; then
                name=$(basename "$f" | sed 's/\.h$//; s/\.hpp$//')
                size=$(stat -c%s "$f")
                md5=$(md5sum "$f" | cut -d' ' -f1)
                
                echo "Package: $name-dev" >> Packages
                echo "Version: 1.0" >> Packages
                echo "Type: dev" >> Packages
                echo "Filename: $f" >> Packages
                echo "Size: $size" >> Packages
                echo "MD5sum: $md5" >> Packages
                echo "DestDir: include" >> Packages
                echo "" >> Packages
              fi
            done
          fi
          
          # Подсчёт пакетов
          count=$(grep -c "^Package:" Packages)
          echo "" >> Packages
          echo "# Total packages: $count" >> Packages
          
          cat Packages
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Packages
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Packages file with lib/dev support"
            git push
          fi
