name: Update Packages

on:
  push:
    paths:
      - 'pool/**'
      - 'lib/**'
      - 'include/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Packages file
        run: |
          echo "# WPM Packages" > Packages
          echo "# Auto-generated by GitHub Actions" >> Packages
          echo "" >> Packages
          
          # Рекурсивно обходим ВСЕ файлы в pool/main (включая подпапки)
          find pool/main -type f | sort | while read f; do
            if [ -f "$f" ]; then
              name=$(basename "$f")
              size=$(stat -c%s "$f")
              md5=$(md5sum "$f" | cut -d' ' -f1)
              
              # Определяем тип файла по расширению
              case "$name" in
                *.a)
                  type="lib"
                  destdir="lib"
                  ;;
                *.so)
                  type="so"
                  destdir="lib"
                  ;;
                *.so.*)
                  type="so"
                  destdir="lib"
                  ;;
                *.h)
                  type="dev"
                  destdir="include"
                  ;;
                *.hpp)
                  type="dev"
                  destdir="include"
                  ;;
                *)
                  type="bin"
                  destdir="bin"
                  ;;
              esac
              
              echo "Package: $name" >> Packages
              echo "Version: 1.0" >> Packages
              echo "Type: $type" >> Packages
              echo "Filename: $f" >> Packages
              echo "Size: $size" >> Packages
              echo "MD5sum: $md5" >> Packages
              echo "DestDir: $destdir" >> Packages
              
              # Добавляем симлинки для .so библиотек
              if [ "$type" = "so" ]; then
                  base=$(echo "$name" | sed 's/\.so.*//')
                  echo "Symlinks: ${base}.so" >> Packages
              fi
              
              echo "" >> Packages
            fi
          done
          
          # Подсчёт пакетов
          count=$(grep -c "^Package:" Packages)
          echo "" >> Packages
          echo "# Total packages: $count" >> Packages
          
          echo "Generated $count packages"
          cat Packages
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Packages
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Packages file with lib support"
            git push
          fi
