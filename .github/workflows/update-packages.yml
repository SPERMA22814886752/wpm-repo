name: Update Packages

on:
  push:
    paths:
      - 'pool/**'
      - 'lib/**'
      - 'include/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Packages file
        run: |
          echo "# WPM Packages" > Packages
          echo "# Auto-generated by GitHub Actions" >> Packages
          echo "" >> Packages

          # Временный файл для сортировки
          temp_file=$(mktemp)

          # Собираем информацию о пакетах
          find pool/main -type f | sort | while read f; do
            if [ ! -f "$f" ]; then
              continue
            fi

            # Игнорируем мусор и временные файлы
            if echo "$f" | grep -qE '(\.download$|\.tmp$|\.swp$|~$)'; then
              continue
            fi

            # Игнорируем внутренности GCC
            if echo "$f" | grep -q 'pool/main/lib/a/gcc/'; then
              continue
            fi

            # Определяем тип и параметры пакета
            type=""
            destdir=""
            pkgname=""
            libc="no"

            # Библиотеки из lib/so
            if echo "$f" | grep -qE '^pool/main/lib/so/'; then
              type="so"
              destdir="lib"
              pkgname=$(basename "$f" | sed 's/\.tar\.xz$//')
              libc="so"
              
              # Если это архив с библиотекой
              if echo "$f" | grep -q 'libc.tar.xz$'; then
                # Извлекаем реальное имя пакета из пути
                pkgname=$(echo "$f" | sed 's|^pool/main/lib/so/||' | sed 's|/libc\.tar\.xz$||')
                libc="so"
              fi
              
            # Библиотеки из lib/a  
            elif echo "$f" | grep -qE '^pool/main/lib/a/'; then
              type="a"
              destdir="lib"
              pkgname=$(basename "$f" | sed 's/\.tar\.xz$//')
              libc="a"
              
              if echo "$f" | grep -q 'libc.tar.xz$'; then
                pkgname=$(echo "$f" | sed 's|^pool/main/lib/a/||' | sed 's|/libc\.tar\.xz$||')
                libc="a"
              fi
              
            # Обычные пакеты
            else
              # Архивы .tar.gz
              if echo "$f" | grep -qE '\.tar\.gz$'; then
                type="dir"
                pkgname=$(basename "$f" .tar.gz)
                destdir="bin"
                
                # Специальные случаи
                case "$pkgname" in
                  gcc|musl|linux)
                    destdir="/"
                    ;;
                  xorg|xorg-server|mesa|libdrm)
                    destdir="bin"
                    ;;
                esac
                
              # Отдельные файлы
              else
                name=$(basename "$f")
                
                case "$name" in
                  *.a)
                    type="lib"
                    destdir="lib"
                    pkgname="$name"
                    ;;
                  *.so|*.so.*)
                    type="so"
                    destdir="lib"
                    pkgname="$name"
                    # Проверяем, не libc ли это
                    if echo "$name" | grep -qE '^libc\.so|^ld-musl'; then
                      libc="so"
                    fi
                    ;;
                  *.la)
                    type="la"
                    destdir="lib"
                    pkgname="$name"
                    ;;
                  *.h|*.hpp)
                    type="dev"
                    destdir="include"
                    pkgname="$name"
                    ;;
                  *)
                    type="bin"
                    destdir="bin"
                    pkgname="$name"
                    ;;
                esac
              fi
            fi

            # Пропускаем если тип не определён
            if [ -z "$type" ]; then
              echo "Warning: unknown type for $f" >&2
              continue
            fi

            # Получаем метаданные
            size=$(stat -c%s "$f")
            md5=$(md5sum "$f" | cut -d' ' -f1)
            
            # Определяем StripComponents для архивов
            strip_components=0
            if [ "$type" = "dir" ]; then
              # Проверяем структуру архива
              if tar -tzf "$f" 2>/dev/null | head -1 | grep -q '^[^/]*/usr/'; then
                strip_components=1
              fi
            fi

            # Записываем в временный файл
            {
              echo "Package: $pkgname"
              echo "Version: 1.0"
              echo "Type: $type"
              echo "Filename: $f"
              echo "Size: $size"
              echo "MD5sum: $md5"
              echo "DestDir: $destdir"
              echo "libc: $libc"
              if [ $strip_components -gt 0 ]; then
                echo "StripComponents: $strip_components"
              fi
              echo ""
            } >> "$temp_file"
          done

          # Сортируем пакеты по имени и добавляем в Packages
          sort -t: -k2 "$temp_file" | while IFS= read -r line; do
            echo "$line"
          done >> Packages

          rm -f "$temp_file"

          count=$(grep -c "^Package:" Packages)
          echo "" >> Packages
          echo "# Total packages: $count" >> Packages

          echo "Generated $count packages"
          
          # Показываем первые 20 пакетов для отладки
          echo ""
          echo "=== Sample of generated packages ==="
          grep -A7 "^Package:" Packages | head -40

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Packages
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Packages"
            git push
          fi
