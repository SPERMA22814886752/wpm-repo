name: Update Packages

on:
  push:
    paths:
      - 'pool/main/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Packages file
        run: |
          echo "# WPM Packages" > Packages
          echo "" >> Packages
          for f in pool/main/*; do
            if [ -f "$f" ]; then
              name=$(basename "$f")
              size=$(stat -c%s "$f")
              md5=$(md5sum "$f" | cut -d' ' -f1)
              echo "Package: $name" >> Packages
              echo "Version: 1.0" >> Packages
              echo "Filename: $f" >> Packages
              echo "Size: $size" >> Packages
              echo "MD5sum: $md5" >> Packages
              echo "" >> Packages
            fi
          done
          cat Packages
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Packages
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Packages file"
            git push
          fi
