name: Update Packages

on:
  push:
    paths:
      - 'pool/**'
      - 'lib/**'
      - 'include/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      metadata: read # Фикс ошибки 'could not read Username'
    steps:
      - uses: actions/checkout@v4

      - name: Generate Packages file
        run: |
          echo "# WPM Packages" > Packages
          echo "# Auto-generated by GitHub Actions" >> Packages
          echo "" >> Packages

          # Ищем файлы в pool/main
          find pool/main -type f | sort | while read f; do
            if [ -f "$f" ]; then
              # относительный путь от pool/main
              rel="${f#pool/main/}"

              # ИГНОРИРУЕМ внутренний мусор GCC
              if echo "$f" | grep -q 'pool/main/lib/a/gcc/'; then
                continue
              fi

              # Флаг для определения системной libc
              is_libc="no"

              # --- Библиотеки из libc (исправлен путь с libc/ на lib/) ---
              if echo "$rel" | grep -qE '^lib/so/'; then
                type="so"
                destdir="lib"
                pkgname=$(basename "$f")
                is_libc="yes"
              elif echo "$rel" | grep -qE '^lib/a/'; then
                type="a"
                destdir="lib"
                pkgname=$(basename "$f")
                is_libc="yes"
              else
                # --- Обычные пакеты ---
                if echo "$f" | grep -qE '\.tar\.gz$'; then
                  type="dir"
                  pkgname=$(basename "$f" .tar.gz)
                  
                  # ЖЁСТКИЙ ФИКС ДЛЯ ЕЖА: gcc в корень "/", остальное в "bin"
                  if [ "$pkgname" = "gcc" ]; then
                    destdir="/"
                  else
                    destdir="bin"
                  fi
                else
                  name=$(basename "$f")
                  case "$name" in
                    *.a)
                      type="lib"
                      destdir="lib"
                      ;;
                    *.so|*.so.*|ld-musl-*)
                      type="so"
                      destdir="lib"
                      ;;
                    *.la)
                      type="la"
                      destdir="lib"
                      ;;
                    *.h|*.hpp)
                      type="dev"
                      destdir="include"
                      ;;
                    *)
                      type="bin"
                      destdir="bin"
                      ;;
                  esac
                  pkgname="$name"
                fi
              fi

              # Фикс конкретно для динамического линковщика мусла
              if [ "$pkgname" = "ld-musl-x86_64.so.1" ]; then
                destdir="lib"
                is_libc="yes"
              fi

              size=$(stat -c%s "$f")
              md5=$(md5sum "$f" | cut -d' ' -f1)

              {
                echo "Package: $pkgname"
                echo "Version: 1.0"
                echo "Type: $type"
                echo "Filename: $f"
                echo "Size: $size"
                echo "MD5sum: $md5"
                echo "DestDir: $destdir"
                echo "libc: $is_libc"
                echo ""
              } >> Packages
            fi
          done

          count=$(grep -c "^Package:" Packages)
          echo "" >> Packages
          echo "# Total packages: $count" >> Packages

          echo "Generated $count packages"
          cat Packages

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Packages
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Packages (fix DestDir for gcc/musl and permissions)"
            git push
          fi
