name: Update Packages

on:
  push:
    paths:
      - 'pool/**'
      - 'lib/**'
      - 'include/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Packages file
        run: |
          echo "# WPM Packages" > Packages
          echo "# Auto-generated by GitHub Actions" >> Packages
          echo "" >> Packages

          # Рекурсивный обход всех файлов в pool/main
          find pool/main -type f | sort | while read f; do
            if [ -f "$f" ]; then
              # относительный путь от pool/main
              rel="${f#pool/main/}"

              # --- Библиотеки из libc ---
              if echo "$rel" | grep -qE '^libc/so/[^/]+/'; then
                type="so"
                destdir="lib"
                pkgname=$(echo "$rel" | cut -d'/' -f3)
              elif echo "$rel" | grep -qE '^libc/a/[^/]+/'; then
                type="a"
                destdir="lib"
                pkgname=$(echo "$rel" | cut -d'/' -f3)
              else
                # --- Обычные пакеты ---
                if echo "$f" | grep -qE '\.tar\.gz$'; then
                  type="dir"
                  destdir="bin"
                  pkgname=$(basename "$f" .tar.gz)
                else
                  name=$(basename "$f")
                  case "$name" in
                    *.a)
                      type="lib"
                      destdir="lib"
                      ;;
                    *.so|*.so.*)
                      type="so"
                      destdir="lib"
                      ;;
                    *.la)                     # libtool archive
                      type="la"
                      destdir="lib"
                      ;;
                    *.h|*.hpp)
                      type="dev"
                      destdir="include"
                      ;;
                    *)
                      type="bin"
                      destdir="bin"
                      ;;
                  esac
                  pkgname="$name"
                fi
              fi

              size=$(stat -c%s "$f")
              md5=$(md5sum "$f" | cut -d' ' -f1)

              {
                echo "Package: $pkgname"
                echo "Version: 1.0"
                echo "Type: $type"
                echo "Filename: $f"
                echo "Size: $size"
                echo "MD5sum: $md5"
                echo "DestDir: $destdir"
                echo "libc: no"
                echo ""
              } >> Packages
            fi
          done

          count=$(grep -c "^Package:" Packages)
          echo "" >> Packages
          echo "# Total packages: $count" >> Packages

          echo "Generated $count packages"
          cat Packages

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Packages
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Packages (add .la support)"
            git push
          fi
